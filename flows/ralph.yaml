# Ralph Loop: Build-review-fix until CLEAN
name: ralph
description: Build-review-fix loop until CLEAN verdict or max iterations
max_iterations: 3
steps:
  - id: build
    command: canon:build
    passthrough_flags: true
  - id: review-loop
    agent: canon-reviewer
    loop_until: verdict == "CLEAN"
    max_iterations: 3
    on_violation:
      - agent: canon-refactorer
        parallel_per: violation_group
