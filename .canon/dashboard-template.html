<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canon Dashboard</title>
  <script src="https://d3js.org/d3.v7.min.js" defer></script>
  <style>
    :root {
      --bg: #1a1a2e;
      --bg-surface: #16213e;
      --bg-card: #0f3460;
      --text: #e0e0e0;
      --text-muted: #8e8e9e;
      --text-bright: #ffffff;
      --accent: #4A90D9;
      --border: #2a2a4a;
      --danger: #e74c3c;
      --warning: #f39c12;
      --success: #27ae60;
      --info: #3498db;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-title { font-size: 20px; font-weight: 700; color: var(--text-bright); }
    .sidebar-subtitle { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    .sidebar-nav { flex: 1; padding: 8px 0; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; width: 100%;
      padding: 10px 16px; border: none; background: none;
      color: var(--text); cursor: pointer; font-family: inherit;
      font-size: 13px; text-align: left; transition: background 0.15s;
    }
    .nav-item:hover { background: rgba(255,255,255,0.05); }
    .nav-item.active { background: var(--bg-card); color: var(--text-bright); border-left: 3px solid var(--accent); }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); }
    .sidebar-version { font-size: 11px; color: var(--text-muted); }

    /* Main content */
    .main-content { flex: 1; overflow-y: auto; padding: 24px; }
    .view-header { margin-bottom: 20px; }
    .view-header h2 { font-size: 18px; color: var(--text-bright); margin-bottom: 12px; }

    /* Filters */
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 12px; font-size: 12px;
      background: var(--bg-card); cursor: pointer;
    }
    .chip input { width: 12px; height: 12px; }
    .chip-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .search-input {
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text); padding: 6px 12px; border-radius: 6px;
      font-family: inherit; font-size: 13px; width: 240px;
    }
    .search-input:focus { outline: none; border-color: var(--accent); }

    /* Search results dropdown */
    .search-wrapper { position: relative; display: inline-block; }
    .search-results {
      position: absolute; top: 100%; left: 0; width: 360px; max-height: 240px;
      overflow-y: auto; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 6px; margin-top: 4px; z-index: 100; display: none;
    }
    .search-results.open { display: block; }
    .search-result-item {
      padding: 6px 12px; font-size: 12px; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      border-bottom: 1px solid var(--border);
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover, .search-result-item.active { background: rgba(74, 144, 217, 0.2); }
    .search-result-item .match-path { color: var(--text-bright); }
    .search-result-item .match-highlight { color: var(--accent); font-weight: 600; }

    /* Buttons */
    .btn {
      background: var(--accent); color: white; border: none;
      padding: 6px 16px; border-radius: 6px; cursor: pointer;
      font-family: inherit; font-size: 13px;
    }
    .btn:hover { opacity: 0.9; }
    .btn-ghost {
      background: transparent; color: var(--text-muted); border: 1px solid var(--border);
      padding: 6px 16px; border-radius: 6px; cursor: pointer;
      font-family: inherit; font-size: 13px;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.05); color: var(--text); }

    /* Badges */
    .verdict-badge, .severity-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 600; color: white; text-transform: uppercase;
    }
    .tag {
      display: inline-block; padding: 2px 6px; border-radius: 3px;
      font-size: 10px; background: var(--bg); color: var(--text-muted); margin-right: 4px;
    }

    /* Tables */
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table th, .data-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    .data-table th { color: var(--text-muted); font-weight: 600; font-size: 11px; text-transform: uppercase; }
    .violation-row { background: rgba(231, 76, 60, 0.1); }
    .layer-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }

    /* Graph layout */
    .graph-layout { display: flex; gap: 16px; height: calc(100vh - 160px); }
    .graph-canvas { flex: 1; background: var(--bg-surface); border-radius: 8px; overflow: hidden; position: relative; }
    .graph-canvas svg { width: 100%; height: 100%; }
    .detail-panel { width: 320px; background: var(--bg-surface); border-radius: 8px; padding: 16px; overflow-y: auto; }
    .detail-field { margin: 12px 0; }
    .detail-field label { display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
    .detail-placeholder { color: var(--text-muted); font-style: italic; }
    .file-summary { font-size: 13px; line-height: 1.6; color: var(--text); }

    /* PR Review */
    .pr-input-bar { display: flex; gap: 8px; }
    .pr-content { margin-top: 16px; }
    .review-summary { background: var(--bg-surface); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
    .verdict-large { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
    .score-grid { display: flex; gap: 24px; }
    .score-item label { display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; }
    .score-item span { font-size: 18px; font-weight: 600; }
    .violations-section, .honored-section, .files-section { margin-top: 16px; }
    .violations-section h3, .honored-section h3, .files-section h3 { font-size: 14px; margin-bottom: 8px; }
    .violation-item {
      background: var(--bg-surface); border-radius: 6px;
      padding: 10px 12px; margin-bottom: 6px;
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    }
    .violation-item p { width: 100%; font-size: 13px; color: var(--text-muted); }
    .suggestion { color: var(--info) !important; }
    .honored-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .honored-chip { background: rgba(39, 174, 96, 0.2); color: var(--success); padding: 3px 8px; border-radius: 4px; font-size: 12px; }
    .file-list { list-style: none; }
    .file-list li { padding: 4px 0; font-size: 13px; color: var(--text-muted); }

    /* Insights */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--bg-surface); border-radius: 8px; padding: 16px; text-align: center; }
    .stat-value { font-size: 28px; font-weight: 700; color: var(--text-bright); }
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-top: 4px; }
    .insight-section { margin-bottom: 24px; }
    .insight-section h3 { font-size: 14px; color: var(--text-bright); margin-bottom: 12px; }
    .cycle-chain {
      background: var(--bg-surface); border-radius: 6px; padding: 10px 14px;
      margin-bottom: 6px; font-size: 13px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .cycle-arrow { color: var(--danger); font-weight: 700; }
    .cycle-file { color: var(--text-bright); }

    /* Chat */
    .chat-layout { display: flex; flex-direction: column; height: calc(100vh - 120px); }
    .chat-messages { flex: 1; overflow-y: auto; padding: 8px 0; }
    .chat-msg { margin-bottom: 16px; display: flex; gap: 10px; }
    .chat-msg-user { justify-content: flex-end; }
    .chat-msg-user .chat-bubble { background: var(--accent); color: white; }
    .chat-msg-bot .chat-bubble { background: var(--bg-card); }
    .chat-bubble {
      max-width: 75%; padding: 10px 14px; border-radius: 12px;
      font-size: 13px; line-height: 1.6;
    }
    .chat-bubble code { background: rgba(0,0,0,0.2); padding: 1px 4px; border-radius: 3px; font-size: 12px; }
    .chat-bubble .chat-data-table { margin-top: 8px; }
    .chat-bubble .chat-data-table td, .chat-bubble .chat-data-table th { padding: 4px 8px; font-size: 12px; }
    .chat-input-bar { display: flex; gap: 8px; padding-top: 12px; border-top: 1px solid var(--border); }
    .chat-input-bar input { flex: 1; }
    .chat-suggestions { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .chat-suggestion {
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-muted); padding: 4px 10px; border-radius: 12px;
      font-size: 11px; cursor: pointer; font-family: inherit;
    }
    .chat-suggestion:hover { border-color: var(--accent); color: var(--text); }

    /* Utility */
    .empty-state { color: var(--text-muted); font-style: italic; padding: 40px; text-align: center; }
    .empty-state code { background: var(--bg-card); padding: 2px 6px; border-radius: 3px; }
    .loading { color: var(--text-muted); }
    .text-danger { color: var(--danger); }
    .text-info { color: var(--info); }
    .text-muted { color: var(--text-muted); }
    .truncated { color: var(--text-muted); font-size: 12px; margin-top: 8px; }
    .graph-fallback { padding: 16px; }
    .graph-fallback h3 { margin-bottom: 8px; }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content" id="main-content"></main>

  <!-- DATA INJECTION — deploy_dashboard replaces these with actual JSON -->
  <script id="canon-graph-data" type="application/json">__CANON_GRAPH_DATA__</script>
  <script id="canon-pr-reviews" type="application/json">__CANON_PR_REVIEWS__</script>

  <script>
    // ── Theme constants ──
    const LAYER_COLORS = { api:'#4A90D9', ui:'#50C878', domain:'#9B59B6', data:'#E67E22', infra:'#7F8C8D', shared:'#1ABC9C', unknown:'#BDC3C7' };
    const VERDICT_COLORS = { CLEAN:'#27ae60', WARNING:'#f39c12', BLOCKING:'#e74c3c' };
    const SEVERITY_COLORS = { rule:'#e74c3c', 'strong-opinion':'#f39c12', convention:'#3498db' };

    // ── Data loader ──
    function loadEmbeddedData(id) {
      const el = document.getElementById(id);
      if (!el) return null;
      try {
        const text = el.textContent.trim();
        if (text.startsWith('__')) return null;
        return JSON.parse(text);
      } catch { return null; }
    }

    const DATA = {
      graph: loadEmbeddedData('canon-graph-data'),
      prReviews: loadEmbeddedData('canon-pr-reviews'),
    };

    // ── Pre-compute edge maps for detail panel ──
    const EDGE_IN = new Map();
    const EDGE_OUT = new Map();
    if (DATA.graph?.edges) {
      for (const e of DATA.graph.edges) {
        const s = e.source?.id || e.source;
        const t = e.target?.id || e.target;
        if (!EDGE_OUT.has(s)) EDGE_OUT.set(s, []);
        EDGE_OUT.get(s).push(t);
        if (!EDGE_IN.has(t)) EDGE_IN.set(t, []);
        EDGE_IN.get(t).push(s);
      }
    }

    // ── Summaries map ──
    const SUMMARIES = {};
    if (DATA.graph?.nodes) {
      for (const n of DATA.graph.nodes) {
        if (n.summary) SUMMARIES[n.id] = n.summary;
      }
    }

    // ── Filter helpers ──
    function createLayerFilters(container, layers, onChange) {
      container.innerHTML = layers.map(layer => `
        <label class="chip">
          <input type="checkbox" checked data-layer="${layer}">
          <span class="chip-dot" style="background: ${LAYER_COLORS[layer] || LAYER_COLORS.unknown}"></span>
          ${layer}
        </label>
      `).join('');
      container.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', () => {
          const active = Array.from(container.querySelectorAll('input:checked')).map(el => el.dataset.layer);
          onChange(active);
        });
      });
    }

    function createSearchFilter(container, placeholder, onSearch) {
      container.innerHTML = `<input type="text" class="search-input" placeholder="${placeholder}">`;
      const input = container.querySelector('.search-input');
      let timeout;
      input.addEventListener('input', () => {
        clearTimeout(timeout);
        timeout = setTimeout(() => onSearch(input.value), 200);
      });
    }

    function severityBadge(severity) {
      return `<span class="severity-badge" style="background: ${SEVERITY_COLORS[severity] || '#7f8c8d'}">${severity}</span>`;
    }

    function verdictBadge(verdict) {
      return `<span class="verdict-badge" style="background: ${VERDICT_COLORS[verdict] || '#7f8c8d'}">${verdict}</span>`;
    }

    // ── Sidebar ──
    const NAV_ITEMS = [
      { id: 'graph', label: 'Codebase Graph', icon: '\u25C9' },
      { id: 'insights', label: 'Insights', icon: '\u2261' },
      { id: 'chat', label: 'Ask Codebase', icon: '\u2709' },
      { id: 'pr-review', label: 'PR Review', icon: '\u2398' },
    ];

    function initSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.innerHTML = `
        <div class="sidebar-header">
          <h1 class="sidebar-title">Canon</h1>
          <span class="sidebar-subtitle">Dashboard</span>
        </div>
        <nav class="sidebar-nav">
          ${NAV_ITEMS.map(item => `
            <button class="nav-item" data-view="${item.id}">
              <span class="nav-icon">${item.icon}</span>
              <span class="nav-label">${item.label}</span>
            </button>
          `).join('')}
        </nav>
        <div class="sidebar-footer"><span class="sidebar-version">v2.0</span></div>
      `;
      const buttons = sidebar.querySelectorAll('.nav-item');
      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          buttons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          loadView(btn.dataset.view);
        });
      });
      if (buttons.length > 0) buttons[0].classList.add('active');
    }

    // ── View router ──
    const VIEWS = { graph: renderGraph, insights: renderInsights, chat: renderChat, 'pr-review': renderPrReview };

    function loadView(viewId) {
      const main = document.getElementById('main-content');
      main.innerHTML = '';
      const fn = VIEWS[viewId];
      if (fn) fn(main);
      else main.innerHTML = '<p class="empty-state">Unknown view</p>';
    }

    // ── Graph view ──
    // Persistent graph state so search/filter doesn't rebuild the simulation
    let graphState = null;

    function renderGraph(container) {
      container.innerHTML = `
        <div class="view-header">
          <h2>Codebase Graph</h2>
          <div id="graph-filters" class="filter-bar"></div>
          <div id="graph-search" class="filter-bar"></div>
        </div>
        <div class="graph-layout">
          <div id="graph-canvas" class="graph-canvas"></div>
          <div id="graph-detail" class="detail-panel">
            <p class="detail-placeholder">Click a node to see details</p>
          </div>
        </div>
      `;

      const data = DATA.graph;
      if (!data) {
        container.querySelector('#graph-canvas').innerHTML = '<p class="empty-state">No graph data. Run <code>/canon:dashboard</code> to generate.</p>';
        return;
      }

      const canvas = container.querySelector('#graph-canvas');
      const detail = container.querySelector('#graph-detail');
      let activeLayers = [...new Set(data.nodes.map(n => n.layer))];
      let searchQuery = '';

      createLayerFilters(container.querySelector('#graph-filters'), activeLayers, (layers) => {
        activeLayers = layers;
        applyFilters();
      });

      // Search with results dropdown
      const searchContainer = container.querySelector('#graph-search');
      searchContainer.innerHTML = `
        <div class="search-wrapper">
          <input type="text" class="search-input" placeholder="Search files... (type to highlight)">
          <div class="search-results" id="graph-search-results"></div>
        </div>
      `;
      const searchInput = searchContainer.querySelector('.search-input');
      const searchResults = searchContainer.querySelector('#graph-search-results');
      let searchTimeout;

      searchInput.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          searchQuery = searchInput.value;
          applyFilters();
          updateSearchDropdown();
        }, 150);
      });

      searchInput.addEventListener('focus', () => { if (searchQuery) updateSearchDropdown(); });
      document.addEventListener('click', (e) => {
        if (!searchContainer.contains(e.target)) searchResults.classList.remove('open');
      });
      searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') { searchQuery = ''; searchInput.value = ''; applyFilters(); searchResults.classList.remove('open'); }
      });

      function updateSearchDropdown() {
        if (!searchQuery || searchQuery.length < 2) { searchResults.classList.remove('open'); return; }
        const q = searchQuery.toLowerCase();
        const matches = data.nodes.filter(n => activeLayers.includes(n.layer) && n.id.toLowerCase().includes(q)).slice(0, 15);
        if (matches.length === 0) { searchResults.classList.remove('open'); return; }
        searchResults.innerHTML = matches.map(n => {
          const idx = n.id.toLowerCase().indexOf(q);
          const before = n.id.slice(0, idx);
          const match = n.id.slice(idx, idx + q.length);
          const after = n.id.slice(idx + q.length);
          return `<div class="search-result-item" data-id="${n.id}">
            <span class="chip-dot" style="background:${LAYER_COLORS[n.layer] || LAYER_COLORS.unknown}"></span>
            <span class="match-path">${before}<span class="match-highlight">${match}</span>${after}</span>
          </div>`;
        }).join('');
        searchResults.classList.add('open');
        searchResults.querySelectorAll('.search-result-item').forEach(item => {
          item.addEventListener('click', () => {
            const nodeId = item.dataset.id;
            searchResults.classList.remove('open');
            zoomToNode(nodeId);
            const nodeData = data.nodes.find(n => n.id === nodeId);
            if (nodeData) showGraphDetail(detail, nodeData);
          });
        });
      }

      function zoomToNode(nodeId) {
        if (!graphState) return;
        const d = graphState.nodesCopy.find(n => n.id === nodeId);
        if (!d || d.x == null) return;
        const svg = graphState.svg;
        const width = graphState.width;
        const height = graphState.height;
        const scale = 2;
        const transform = d3.zoomIdentity.translate(width / 2 - d.x * scale, height / 2 - d.y * scale).scale(scale);
        svg.transition().duration(500).call(graphState.zoom.transform, transform);
        // Flash the target node
        graphState.nodeSelection.attr('r', n => n.id === nodeId ? 16 : nodeRadius(n));
        setTimeout(() => {
          graphState.nodeSelection.attr('r', nodeRadius);
        }, 800);
        // Show detail
        const nodeData = data.nodes.find(n => n.id === nodeId);
        if (nodeData) showGraphDetail(detail, nodeData);
      }

      function nodeRadius(d) { return 6 + Math.min((d.violation_count || 0) * 2, 14); }

      function applyFilters() {
        if (!graphState) return;
        const q = searchQuery.toLowerCase();
        const hasSearch = q.length >= 2;

        graphState.nodeSelection
          .attr('opacity', d => {
            if (!activeLayers.includes(d.layer)) return 0;
            if (hasSearch && !d.id.toLowerCase().includes(q)) return 0.15;
            return 1;
          })
          .attr('r', d => {
            if (hasSearch && d.id.toLowerCase().includes(q)) return nodeRadius(d) + 3;
            return nodeRadius(d);
          })
          .attr('stroke', d => {
            if (hasSearch && d.id.toLowerCase().includes(q)) return '#4A90D9';
            return (d.violation_count || 0) > 0 ? VERDICT_COLORS.BLOCKING : '#333';
          })
          .attr('stroke-width', d => {
            if (hasSearch && d.id.toLowerCase().includes(q)) return 3;
            return (d.violation_count || 0) > 0 ? 2 : 1;
          });

        graphState.linkSelection
          .attr('opacity', d => {
            const sId = d.source?.id || d.source;
            const tId = d.target?.id || d.target;
            const sNode = graphState.nodesCopy.find(n => n.id === sId);
            const tNode = graphState.nodesCopy.find(n => n.id === tId);
            if (!sNode || !tNode) return 0;
            if (!activeLayers.includes(sNode.layer) || !activeLayers.includes(tNode.layer)) return 0;
            if (hasSearch) {
              const sMatch = sId.toLowerCase().includes(q);
              const tMatch = tId.toLowerCase().includes(q);
              if (sMatch || tMatch) return 0.6;
              return 0.05;
            }
            return 0.3;
          });
      }

      // Build the D3 graph once, then use applyFilters for search/layer changes
      buildD3Graph(canvas, detail, data);
    }

    function buildD3Graph(canvas, detail, data) {
      if (typeof d3 === 'undefined') {
        canvas.innerHTML = `
          <div class="graph-fallback">
            <h3>Graph Data Summary</h3>
            <p>${data.nodes.length} files, ${data.edges.length} dependencies</p>
            <table class="data-table">
              <thead><tr><th>File</th><th>Layer</th><th>Violations</th></tr></thead>
              <tbody>
                ${data.nodes.slice(0, 50).map(n => `
                  <tr class="${n.violation_count > 0 ? 'violation-row' : ''}">
                    <td>${n.id}</td>
                    <td><span class="layer-dot" style="background:${n.color}"></span>${n.layer}</td>
                    <td>${n.violation_count || '-'}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
            ${data.nodes.length > 50 ? `<p class="truncated">...and ${data.nodes.length - 50} more</p>` : ''}
          </div>
        `;
        return;
      }

      canvas.innerHTML = '';
      const width = canvas.clientWidth || 800;
      const height = canvas.clientHeight || 600;

      const nodesCopy = data.nodes.map(n => ({...n}));
      const edgesCopy = data.edges.map(e => ({ source: e.source?.id || e.source, target: e.target?.id || e.target }));

      const svg = d3.select(canvas).append('svg').attr('width', width).attr('height', height).attr('viewBox', [0, 0, width, height]);
      const g = svg.append('g');
      const zoom = d3.zoom().on('zoom', (event) => g.attr('transform', event.transform));
      svg.call(zoom);

      const simulation = d3.forceSimulation(nodesCopy)
        .force('link', d3.forceLink(edgesCopy).id(d => d.id).distance(80))
        .force('charge', d3.forceManyBody().strength(-200))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collision', d3.forceCollide().radius(20));

      function nodeRadius(d) { return 6 + Math.min((d.violation_count || 0) * 2, 14); }

      const linkSelection = g.selectAll('.link').data(edgesCopy).join('line').attr('stroke', '#555').attr('stroke-opacity', 0.3);
      const nodeSelection = g.selectAll('.node').data(nodesCopy).join('circle')
        .attr('r', nodeRadius)
        .attr('fill', d => d.color || LAYER_COLORS[d.layer] || LAYER_COLORS.unknown)
        .attr('stroke', d => (d.violation_count || 0) > 0 ? VERDICT_COLORS.BLOCKING : '#333')
        .attr('stroke-width', d => (d.violation_count || 0) > 0 ? 2 : 1)
        .style('cursor', 'pointer')
        .on('click', (event, d) => showGraphDetail(detail, d))
        .call(d3.drag()
          .on('start', (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
          .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
          .on('end', (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
        );

      nodeSelection.append('title').text(d => d.id);
      simulation.on('tick', () => {
        linkSelection.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        nodeSelection.attr('cx', d => d.x).attr('cy', d => d.y);
      });

      graphState = { svg, zoom, nodesCopy, nodeSelection, linkSelection, width, height };
    }

    function showGraphDetail(panel, node) {
      const imports = EDGE_OUT.get(node.id) || [];
      const importedBy = EDGE_IN.get(node.id) || [];
      const basename = (p) => p.split('/').pop();

      panel.innerHTML = `
        <h3>${node.id}</h3>
        <div class="detail-field"><label>Layer</label><span class="layer-dot" style="background:${node.color || LAYER_COLORS[node.layer] || '#ccc'}"></span> ${node.layer}</div>
        <div class="detail-field"><label>Dependencies</label><span>Imports ${imports.length} files, imported by ${importedBy.length}</span></div>
        ${imports.length > 0 ? `<div class="detail-field"><label>Imports</label><div>${imports.map(f => `<span class="tag">${basename(f)}</span>`).join('')}</div></div>` : ''}
        ${importedBy.length > 0 ? `<div class="detail-field"><label>Imported By</label><div>${importedBy.map(f => `<span class="tag">${basename(f)}</span>`).join('')}</div></div>` : ''}
        <div class="detail-field"><label>Violations</label><span class="${(node.violation_count || 0) > 0 ? 'text-danger' : ''}">${node.violation_count || 0}</span></div>
        <div class="detail-field"><label>Last Verdict</label>${node.last_verdict ? verdictBadge(node.last_verdict) : '<span class="text-muted">No review</span>'}</div>
        <div class="detail-field"><label>Changed</label>${node.changed ? '<span class="text-info">Yes</span>' : '<span class="text-muted">No</span>'}</div>
        ${node.summary ? `<div class="detail-field"><label>Summary</label><div class="file-summary">${node.summary}</div></div>` : '<div class="detail-field"><label>Summary</label><span class="text-muted">Run <code>/canon:dashboard</code> to generate</span></div>'}
      `;
    }

    // ── Insights view ──
    function renderInsights(container) {
      const data = DATA.graph;
      if (!data || !data.insights) {
        container.innerHTML = '<p class="empty-state">No insights data. Run <code>/canon:graph</code> to generate the codebase graph first.</p>';
        return;
      }

      const ins = data.insights;

      container.innerHTML = `
        <div class="view-header">
          <h2>Codebase Insights</h2>
          <div id="insights-search" class="filter-bar"></div>
        </div>
        <div id="insights-content"></div>
      `;

      let searchQuery = '';
      createSearchFilter(container.querySelector('#insights-search'), 'Filter by file path...', (q) => { searchQuery = q; doRender(); });

      function doRender() {
        const content = container.querySelector('#insights-content');
        const q = searchQuery.toLowerCase();

        // Overview stats
        const overview = ins.overview || {};
        let html = `
          <div class="stat-grid">
            <div class="stat-card"><div class="stat-value">${overview.total_files || 0}</div><div class="stat-label">Files</div></div>
            <div class="stat-card"><div class="stat-value">${overview.total_edges || 0}</div><div class="stat-label">Dependencies</div></div>
            <div class="stat-card"><div class="stat-value">${overview.avg_dependencies_per_file || 0}</div><div class="stat-label">Avg Deps/File</div></div>
            <div class="stat-card"><div class="stat-value">${(ins.circular_dependencies || []).length}</div><div class="stat-label">Cycles</div></div>
            <div class="stat-card"><div class="stat-value">${(ins.layer_violations || []).length}</div><div class="stat-label">Layer Violations</div></div>
            <div class="stat-card"><div class="stat-value">${(ins.orphan_files || []).length}</div><div class="stat-label">Orphan Files</div></div>
          </div>
        `;

        // Most connected
        const connected = (ins.most_connected || []).filter(n => !q || n.path.toLowerCase().includes(q));
        if (connected.length > 0) {
          html += `
            <div class="insight-section">
              <h3>Most Connected Files</h3>
              <table class="data-table">
                <thead><tr><th>File</th><th>Imports</th><th>Imported By</th><th>Total</th></tr></thead>
                <tbody>
                  ${connected.map(n => `<tr><td>${n.path}</td><td>${n.out_degree}</td><td>${n.in_degree}</td><td><strong>${n.total}</strong></td></tr>`).join('')}
                </tbody>
              </table>
            </div>
          `;
        }

        // Circular dependencies
        const cycles = (ins.circular_dependencies || []).filter(c => !q || c.some(f => f.toLowerCase().includes(q)));
        if (cycles.length > 0) {
          html += `
            <div class="insight-section">
              <h3>Circular Dependencies</h3>
              ${cycles.map(cycle => `
                <div class="cycle-chain">
                  ${cycle.map((f, i) => `<span class="cycle-file">${f}</span>${i < cycle.length - 1 ? '<span class="cycle-arrow">\u2192</span>' : ''}`).join('')}
                  <span class="cycle-arrow">\u2192</span>
                  <span class="cycle-file">${cycle[0]}</span>
                </div>
              `).join('')}
            </div>
          `;
        }

        // Layer violations
        const violations = (ins.layer_violations || []).filter(v => !q || v.source.toLowerCase().includes(q) || v.target.toLowerCase().includes(q));
        if (violations.length > 0) {
          html += `
            <div class="insight-section">
              <h3>Layer Violations</h3>
              <table class="data-table">
                <thead><tr><th>Source</th><th>Source Layer</th><th></th><th>Target</th><th>Target Layer</th></tr></thead>
                <tbody>
                  ${violations.map(v => `
                    <tr class="violation-row">
                      <td>${v.source}</td>
                      <td><span class="layer-dot" style="background:${LAYER_COLORS[v.source_layer] || '#ccc'}"></span>${v.source_layer}</td>
                      <td class="text-danger">\u2192</td>
                      <td>${v.target}</td>
                      <td><span class="layer-dot" style="background:${LAYER_COLORS[v.target_layer] || '#ccc'}"></span>${v.target_layer}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          `;
        }

        // Orphan files
        const orphans = (ins.orphan_files || []).filter(f => !q || f.toLowerCase().includes(q));
        if (orphans.length > 0) {
          html += `
            <div class="insight-section">
              <h3>Orphan Files (No Connections)</h3>
              <ul class="file-list">${orphans.map(f => `<li>${f}</li>`).join('')}</ul>
            </div>
          `;
        }

        // Layers breakdown
        if (overview.layers?.length > 0) {
          html += `
            <div class="insight-section">
              <h3>Layer Distribution</h3>
              <table class="data-table">
                <thead><tr><th>Layer</th><th>Files</th></tr></thead>
                <tbody>
                  ${overview.layers.map(l => `<tr><td><span class="layer-dot" style="background:${LAYER_COLORS[l.name] || '#ccc'}"></span>${l.name}</td><td>${l.file_count}</td></tr>`).join('')}
                </tbody>
              </table>
            </div>
          `;
        }

        content.innerHTML = html;
      }

      doRender();
    }

    // ── Chat / Ask Codebase view ──
    function renderChat(container) {
      const data = DATA.graph;

      container.innerHTML = `
        <div class="view-header">
          <h2>Ask Codebase</h2>
        </div>
        <div class="chat-layout">
          <div id="chat-suggestions" class="chat-suggestions"></div>
          <div id="chat-messages" class="chat-messages"></div>
          <div class="chat-input-bar">
            <input type="text" id="chat-input" class="search-input" style="width:100%" placeholder="Ask about your codebase architecture...">
            <button id="chat-send" class="btn">Ask</button>
          </div>
        </div>
      `;

      const messages = container.querySelector('#chat-messages');
      const input = container.querySelector('#chat-input');
      const sendBtn = container.querySelector('#chat-send');
      const suggestionsEl = container.querySelector('#chat-suggestions');

      // Suggested questions
      const suggestions = [
        'What are the most connected files?',
        'Are there any circular dependencies?',
        'Show me orphan files',
        'What layer violations exist?',
        'Give me an overview',
        'What does the data layer look like?',
      ];
      suggestionsEl.innerHTML = suggestions.map(s => `<button class="chat-suggestion">${s}</button>`).join('');
      suggestionsEl.querySelectorAll('.chat-suggestion').forEach(btn => {
        btn.addEventListener('click', () => {
          input.value = btn.textContent;
          doAsk();
        });
      });

      function doAsk() {
        const question = input.value.trim();
        if (!question) return;
        input.value = '';
        addMessage(question, 'user');

        if (!data) {
          addMessage('No graph data available. Run <code>/canon:dashboard</code> to generate.', 'bot');
          return;
        }

        const answer = answerQuestion(question, data);
        addMessage(answer, 'bot');
        messages.scrollTop = messages.scrollHeight;
      }

      sendBtn.addEventListener('click', doAsk);
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') doAsk(); });

      function addMessage(html, role) {
        const div = document.createElement('div');
        div.className = `chat-msg chat-msg-${role}`;
        div.innerHTML = `<div class="chat-bubble">${html}</div>`;
        messages.appendChild(div);
      }

      // Welcome message
      if (data) {
        const ins = data.insights?.overview || {};
        addMessage(`Ready to answer questions about your codebase. <strong>${ins.total_files || 0}</strong> files, <strong>${ins.total_edges || 0}</strong> dependencies across <strong>${(data.insights?.overview?.layers || []).length}</strong> layers.`, 'bot');
      }
    }

    /** Client-side question answering over embedded graph data */
    function answerQuestion(question, data) {
      const q = question.toLowerCase();
      const ins = data.insights || {};
      const nodes = data.nodes || [];
      const edges = data.edges || [];

      // Detect focus
      let focus = 'overview';
      if (q.includes('circular') || q.includes('cycle')) focus = 'cycles';
      else if (q.includes('depend') || q.includes('import') || q.includes('who uses') || q.includes('what uses')) focus = 'dependencies';
      else if (q.includes('orphan') || q.includes('unused') || q.includes('dead')) focus = 'orphans';
      else if (q.includes('hotspot') || q.includes('violation')) focus = 'violations';
      else if (q.includes('connected') || q.includes('hub') || q.includes('central')) focus = 'most_connected';
      else if (q.includes('layer')) focus = 'layers';
      else if (q.includes('summary') || q.includes('what does') || q.includes('explain') || q.includes('role')) focus = 'file_summary';

      // Check if a specific file is mentioned
      const mentionedFile = findMentionedFile(q, nodes);

      if (mentionedFile) {
        const node = nodes.find(n => n.id === mentionedFile);
        const imports = EDGE_OUT.get(mentionedFile) || [];
        const importedBy = EDGE_IN.get(mentionedFile) || [];
        const summary = SUMMARIES[mentionedFile];
        return `<strong>${mentionedFile}</strong><br>
          Layer: <span class="layer-dot" style="background:${LAYER_COLORS[node?.layer] || '#ccc'}"></span>${node?.layer || 'unknown'}<br>
          ${summary ? `Summary: ${summary}<br>` : ''}
          Imports <strong>${imports.length}</strong> files, imported by <strong>${importedBy.length}</strong><br>
          ${imports.length > 0 ? `Imports: ${imports.map(f => `<code>${f.split('/').pop()}</code>`).join(', ')}<br>` : ''}
          ${importedBy.length > 0 ? `Imported by: ${importedBy.map(f => `<code>${f.split('/').pop()}</code>`).join(', ')}<br>` : ''}
          Violations: ${node?.violation_count || 0}`;
      }

      switch (focus) {
        case 'cycles': {
          const cycles = ins.circular_dependencies || [];
          if (cycles.length === 0) return 'No circular dependencies detected.';
          return `Found <strong>${cycles.length}</strong> circular dependenc${cycles.length === 1 ? 'y' : 'ies'}:<br>` +
            cycles.map(c => c.join(' \u2192 ') + ' \u2192 ' + c[0]).map(s => `<code>${s}</code>`).join('<br>');
        }

        case 'dependencies': {
          const mc = ins.most_connected || [];
          if (mc.length === 0) return 'No dependency data available.';
          return `Top connected files:<br>
            <table class="data-table chat-data-table">
              <tr><th>File</th><th>In</th><th>Out</th><th>Total</th></tr>
              ${mc.slice(0, 10).map(n => `<tr><td><code>${n.path}</code></td><td>${n.in_degree}</td><td>${n.out_degree}</td><td><strong>${n.total}</strong></td></tr>`).join('')}
            </table>`;
        }

        case 'orphans': {
          const orphans = ins.orphan_files || [];
          if (orphans.length === 0) return 'No orphan files. Every file has at least one connection.';
          return `Found <strong>${orphans.length}</strong> orphan file${orphans.length === 1 ? '' : 's'} (no imports or importers):<br>` +
            orphans.map(f => `<code>${f}</code>`).join('<br>');
        }

        case 'violations': {
          const v = ins.layer_violations || [];
          const hotspots = nodes.filter(n => n.violation_count > 0).sort((a, b) => b.violation_count - a.violation_count).slice(0, 5);
          let html = '';
          if (v.length > 0) {
            html += `<strong>${v.length}</strong> layer violation${v.length === 1 ? '' : 's'}:<br>` +
              v.slice(0, 10).map(x => `<code>${x.source}</code> (${x.source_layer}) \u2192 <code>${x.target}</code> (${x.target_layer})`).join('<br>');
          }
          if (hotspots.length > 0) {
            html += (html ? '<br><br>' : '') + `Top violation hotspots:<br>` +
              hotspots.map(n => `<code>${n.id}</code>: ${n.violation_count} violation${n.violation_count === 1 ? '' : 's'}`).join('<br>');
          }
          return html || 'No violations found.';
        }

        case 'most_connected': {
          const mc = ins.most_connected || [];
          if (mc.length === 0) return 'No connection data available.';
          return `Most connected files (highest total degree):<br>
            <table class="data-table chat-data-table">
              <tr><th>File</th><th>In</th><th>Out</th><th>Total</th></tr>
              ${mc.slice(0, 10).map(n => `<tr><td><code>${n.path}</code></td><td>${n.in_degree}</td><td>${n.out_degree}</td><td><strong>${n.total}</strong></td></tr>`).join('')}
            </table>`;
        }

        case 'layers': {
          const layerFilter = ['api', 'ui', 'domain', 'data', 'infra', 'shared'].find(l => q.includes(l));
          if (layerFilter) {
            const layerNodes = nodes.filter(n => n.layer === layerFilter);
            return `<span class="layer-dot" style="background:${LAYER_COLORS[layerFilter]}"></span><strong>${layerFilter}</strong> layer: ${layerNodes.length} files<br>` +
              layerNodes.slice(0, 20).map(n => `<code>${n.id}</code>`).join('<br>') +
              (layerNodes.length > 20 ? `<br><span class="text-muted">...and ${layerNodes.length - 20} more</span>` : '');
          }
          const overview = ins.overview || {};
          return `Layer distribution:<br>` +
            (overview.layers || []).map(l => `<span class="layer-dot" style="background:${LAYER_COLORS[l.name] || '#ccc'}"></span><strong>${l.name}</strong>: ${l.file_count} files`).join('<br>');
        }

        case 'file_summary': {
          const count = Object.keys(SUMMARIES).length;
          if (count === 0) return 'No file summaries available. Run <code>/canon:dashboard</code> to generate summaries.';
          return `<strong>${count}</strong> file summaries available. Mention a specific file to see its summary.`;
        }

        default: {
          const overview = ins.overview || {};
          return `<strong>Codebase Overview</strong><br>
            Files: <strong>${overview.total_files || 0}</strong><br>
            Dependencies: <strong>${overview.total_edges || 0}</strong><br>
            Avg deps/file: <strong>${overview.avg_dependencies_per_file || 0}</strong><br>
            Cycles: <strong>${(ins.circular_dependencies || []).length}</strong><br>
            Layer violations: <strong>${(ins.layer_violations || []).length}</strong><br>
            Orphan files: <strong>${(ins.orphan_files || []).length}</strong><br>
            Summaries: <strong>${Object.keys(SUMMARIES).length}</strong><br><br>
            <span class="text-muted">Try asking about specific files, layers, cycles, or dependencies.</span>`;
        }
      }
    }

    function findMentionedFile(question, nodes) {
      const q = question.toLowerCase();
      for (const node of nodes) {
        if (q.includes(node.id.toLowerCase())) return node.id;
      }
      for (const node of nodes) {
        const basename = (node.id.split('/').pop() || '').toLowerCase();
        if (basename && basename.length > 3 && q.includes(basename.replace(/\.[^.]+$/, ''))) return node.id;
      }
      return null;
    }

    // ── PR Review view ──
    function renderPrReview(container) {
      container.innerHTML = `
        <div class="view-header">
          <h2>PR Review</h2>
          <div class="pr-input-bar">
            <input type="text" id="pr-number" placeholder="PR # or branch" class="search-input">
            <button id="load-pr" class="btn">Load Review</button>
          </div>
        </div>
        <div id="pr-content" class="pr-content">
          <p class="empty-state">Enter a PR number or branch name, then click Load Review.<br>Review data is generated by <code>/canon:pr-review</code>.</p>
        </div>
      `;

      const content = container.querySelector('#pr-content');
      const prReviews = DATA.prReviews || {};

      container.querySelector('#load-pr').addEventListener('click', () => {
        const value = container.querySelector('#pr-number').value.trim();
        if (!value) return;
        const reviewData = prReviews[value];
        if (reviewData) {
          showPrReview(content, reviewData);
        } else {
          content.innerHTML = `<p class="empty-state">No review data for "${value}".<br>Run <code>/canon:pr-review ${value}</code> to generate.</p>`;
        }
      });

      const keys = Object.keys(prReviews);
      if (keys.length === 1) {
        container.querySelector('#pr-number').value = keys[0];
        showPrReview(content, prReviews[keys[0]]);
      }
    }

    function showPrReview(container, data) {
      const verdict = data.verdict || 'CLEAN';
      container.innerHTML = `
        <div class="review-summary">
          <div class="verdict-large" style="color: ${VERDICT_COLORS[verdict]}">${verdict}</div>
          <div class="score-grid">
            <div class="score-item"><label>Rules</label><span>${data.score?.rules?.passed || 0}/${data.score?.rules?.total || 0}</span></div>
            <div class="score-item"><label>Opinions</label><span>${data.score?.opinions?.passed || 0}/${data.score?.opinions?.total || 0}</span></div>
            <div class="score-item"><label>Conventions</label><span>${data.score?.conventions?.passed || 0}/${data.score?.conventions?.total || 0}</span></div>
          </div>
        </div>
        ${(data.violations || []).length > 0 ? `
          <div class="violations-section"><h3>Violations</h3>
            ${data.violations.map(v => `
              <div class="violation-item">
                ${severityBadge(v.severity)}
                <strong>${v.principle_id}</strong>
                ${v.file ? `<code>${v.file}</code>` : ''}
                ${v.detail ? `<p>${v.detail}</p>` : ''}
                ${v.suggestion ? `<p class="suggestion">Fix: ${v.suggestion}</p>` : ''}
              </div>
            `).join('')}
          </div>
        ` : ''}
        ${(data.honored || []).length > 0 ? `
          <div class="honored-section"><h3>Honored Principles</h3>
            <div class="honored-list">${data.honored.map(id => `<span class="honored-chip">${id}</span>`).join('')}</div>
          </div>
        ` : ''}
        ${(data.files || []).length > 0 ? `
          <div class="files-section"><h3>Files Reviewed</h3>
            <ul class="file-list">${data.files.map(f => `<li>${f}</li>`).join('')}</ul>
          </div>
        ` : ''}
      `;
    }

    // ── Init — DOMContentLoaded fires AFTER all defer scripts (d3) have loaded ──
    document.addEventListener('DOMContentLoaded', () => {
      initSidebar();
      const hash = window.location.hash.replace('#', '');
      loadView(VIEWS[hash] ? hash : 'graph');
    });
  </script>
</body>
</html>
