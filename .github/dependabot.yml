version: 2
updates:
  - package-ecosystem: npm
    directory: /mcp-server
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps):"
    open-pull-requests-limit: 10
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci:"
    groups:
      all-actions:
        patterns:
          - "*"
